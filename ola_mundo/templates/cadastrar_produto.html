{% extends 'base.html' %}

{% block title %}Cadastro de Produto{% endblock %}

{% block content %}
    <h1>Cadastrar Novo Produto</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Cadastrar</button>
        <p><a href="{% url 'tela_inicial' %}" class="btn btn-primary">Voltar</a></p>
    </form>
{% endblock %}
