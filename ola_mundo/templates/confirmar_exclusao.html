<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Exclusão</title>
</head>
<body>
    <h1>Confirmar Exclusão</h1>
    <p>Você tem certeza que deseja excluir o produto: "{{ produto.nome }}"?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit">Sim, excluir</button>
        <a href="#">Não, cancelar</a>
    </form>
</body>
</html>
